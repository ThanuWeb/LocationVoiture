name: Build ASP.NET Core and Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore projetLocation.csproj

      - name: Build application
        run: dotnet build projetLocation.csproj --configuration Release --no-restore

      - name: Build Docker image
        run: docker build -t locationvoiture -f docker/Dockerfile .