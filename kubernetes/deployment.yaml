apiVersion: apps/v1
kind: Deployment

metadata:
  name: locationvoiture

spec:
  replicas: 1

  selector:
    matchLabels:
      app: locationvoiture

  template:
    metadata:
      labels:
        app: locationvoiture

    spec:
      containers:
        - name: locationvoiture
          image: thanuweb/locationvoiture:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          volumeMounts:
            - name: database-storage
              mountPath: /app/data

      volumes:
        - name: database-storage
          persistentVolumeClaim:
            claimName: locationvoiture-pvc